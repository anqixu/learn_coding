# Exercise metadata for pytorchlings

[[exercises]]
name = "intro01"
path = "exercises/01_intro/intro01.py"
mode = "run"
hint = """
This is your first exercise! Just remove the 'I AM NOT DONE' line and run it.
The exercise will pass once you remove that marker."""

[[exercises]]
name = "intro02"
path = "exercises/01_intro/intro02.py"
mode = "run"
hint = """
Check if PyTorch is installed correctly by importing torch and printing its version.
Use torch.__version__ to get the version string."""

# Tensor Basics
[[exercises]]
name = "tensors01"
path = "exercises/02_tensors/tensors01.py"
mode = "run"
hint = """
Create tensors using torch.tensor(). You can pass Python lists or nested lists.
Try: torch.tensor([1, 2, 3]) or torch.tensor([[1, 2], [3, 4]])"""

[[exercises]]
name = "tensors02"
path = "exercises/02_tensors/tensors02.py"
mode = "run"
hint = """
Use torch.zeros(), torch.ones(), torch.rand(), and torch.randn() to create tensors.
The shape is passed as arguments: torch.zeros(3, 4) creates a 3x4 tensor."""

[[exercises]]
name = "tensors03"
path = "exercises/02_tensors/tensors03.py"
mode = "run"
hint = """
Tensor operations: add (+), subtract (-), multiply (*), divide (/).
You can also use torch.add(), torch.mul(), etc.
Matrix multiplication uses @ or torch.matmul()."""

[[exercises]]
name = "tensors04"
path = "exercises/02_tensors/tensors04.py"
mode = "run"
hint = """
Reshape tensors using .view() or .reshape().
.view() requires contiguous memory, .reshape() is more flexible.
Use -1 to infer a dimension: tensor.view(-1, 4)"""

[[exercises]]
name = "tensors05"
path = "exercises/02_tensors/tensors05.py"
mode = "run"
hint = """
Indexing and slicing work like NumPy: tensor[0], tensor[:, 1], tensor[0:2, 1:3].
Use .item() to get a Python scalar from a single-element tensor."""

# Autograd
[[exercises]]
name = "autograd01"
path = "exercises/03_autograd/autograd01.py"
mode = "run"
hint = """
Set requires_grad=True when creating a tensor to track computations.
Call .backward() on the result to compute gradients.
Access gradients with .grad attribute."""

[[exercises]]
name = "autograd02"
path = "exercises/03_autograd/autograd02.py"
mode = "run"
hint = """
Gradients accumulate by default. Use .zero_() to clear them.
This is important in training loops where you compute gradients multiple times."""

[[exercises]]
name = "autograd03"
path = "exercises/03_autograd/autograd03.py"
mode = "run"
hint = """
Use torch.no_grad() context manager to disable gradient tracking.
This is useful during inference to save memory and computation."""

[[exercises]]
name = "autograd04"
path = "exercises/03_autograd/autograd04.py"
mode = "run"
hint = """
The computational graph tracks all operations.
You can only call .backward() once on a graph unless you set retain_graph=True."""

