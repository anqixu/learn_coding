# Attention Mechanisms
[[exercises]]
name = "attention01"
path = "exercises/19_attention/attention01.py"
mode = "run"
hint = """
Attention computes weighted sum: scores = Q·K, weights = softmax(scores),
output = weights·V. Allows dynamic focus on relevant parts."""

[[exercises]]
name = "attention02"
path = "exercises/19_attention/attention02.py"
mode = "run"
hint = """
Multi-head attention: nn.MultiheadAttention(embed_dim, num_heads).
Each head attends to different aspects of the input."""

[[exercises]]
name = "attention03"
path = "exercises/19_attention/attention03.py"
mode = "run"
hint = """
Self-attention: Q, K, V all come from same sequence.
Scale by √d_model to prevent softmax saturation."""

[[exercises]]
name = "attention04"
path = "exercises/19_attention/attention04.py"
mode = "run"
hint = """
Scaled dot-product: scores = Q·K^T / √d_k, then softmax.
Mask prevents attending to certain positions (e.g., future tokens)."""

